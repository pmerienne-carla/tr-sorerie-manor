<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trésorerie Live — Manor of Skin</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f5f5; --surface: #ffffff; --border: #e0e0e0;
    --accent-green: #00b37a; --accent-red: #e63355; --accent-blue: #2b7fff;
    --text: #1a1a2e; --muted: #888888; --card: #ffffff;
  }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; padding: 32px 24px; }
  .header { margin-bottom: 28px; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; }
  .header h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.03em; line-height: 1; }
  .header h1 span { color: var(--accent-green); }
  .header p { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); margin-top: 6px; letter-spacing: 0.05em; }
  .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .month-nav { display: flex; align-items: center; gap: 8px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 8px 14px; }
  .month-nav button { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; padding: 0 4px; transition: color 0.2s; }
  .month-nav button:hover { color: var(--accent-green); }
  .month-nav span { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--text); min-width: 90px; text-align: center; }
  .solde-input-wrap { display: flex; align-items: center; gap: 8px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 8px 14px; }
  .solde-input-wrap label { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); letter-spacing: 0.06em; white-space: nowrap; }
  .solde-input-wrap input { background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.8rem; width: 100px; outline: none; padding: 2px 4px; }
  .btn-refresh { background: var(--accent-green); color: #0d0f14; border: none; border-radius: 10px; padding: 10px 18px; font-family: 'Syne', sans-serif; font-size: 0.75rem; font-weight: 700; cursor: pointer; letter-spacing: 0.04em; transition: opacity 0.2s; }
  .btn-refresh:hover { opacity: 0.85; }
  .btn-refresh:disabled { opacity: 0.4; cursor: not-allowed; }
  .status { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); margin-bottom: 16px; min-height: 16px; }
  .status.loading { color: var(--accent-blue); } .status.error { color: var(--accent-red); } .status.ok { color: var(--accent-green); }
  .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .kpi { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .kpi-label { font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
  .kpi-value { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em; }
  .neg { color: var(--accent-red); } .pos { color: var(--accent-green); }
  .chart-container { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
  .chart-title { font-size: 0.75rem; font-weight: 600; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
  .legend { display: flex; gap: 18px; margin-bottom: 18px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .table-container { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  .table-header { padding: 14px 20px; border-bottom: 1px solid var(--border); font-size: 0.75rem; font-weight: 600; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  table { width: 100%; border-collapse: collapse; font-family: 'DM Mono', monospace; font-size: 0.7rem; }
  th { text-align: left; padding: 9px 16px; background: var(--surface); color: var(--muted); font-weight: 400; letter-spacing: 0.06em; font-size: 0.62rem; text-transform: uppercase; }
  td { padding: 8px 16px; border-bottom: 1px solid var(--border); color: var(--text); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .tag { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 0.6rem; font-weight: 600; }
  .tag-neg { background: rgba(255,77,109,0.15); color: var(--accent-red); }
  .tag-pos { background: rgba(0,229,160,0.15); color: var(--accent-green); }
  .zero-row td { opacity: 0.35; }
  .mini-bar { height: 4px; border-radius: 2px; margin-bottom: 2px; }
  .empty { text-align: center; padding: 60px; font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--muted); }
  @media (max-width: 700px) { .kpis { grid-template-columns: repeat(2, 1fr); } .kpi-value { font-size: 1rem; } }
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>Trésorerie <span id="monthLabel">—</span></h1>
    <p>MANOR OF SKIN · DONNÉES LIVE DEPUIS NOTION</p>
  </div>
  <div class="controls">
    <div class="month-nav">
      <button onclick="changeMonth(-1)">◀</button>
      <span id="monthDisplay">—</span>
      <button onclick="changeMonth(1)">▶</button>
    </div>
    <div class="solde-input-wrap">
      <label>SOLDE INITIAL</label>
      <input type="number" id="soldeInitial" value="-1431.82" step="0.01" />
    </div>
    <button class="btn-refresh" onclick="loadData()" id="btnRefresh">↻ Actualiser</button>
  </div>
</div>

<div class="status" id="status">En attente…</div>

<div class="kpis">
  <div class="kpi"><div class="kpi-label">Solde initial</div><div class="kpi-value" id="kpiInit">—</div></div>
  <div class="kpi"><div class="kpi-label">Total entrées</div><div class="kpi-value pos" id="kpiIn">—</div></div>
  <div class="kpi"><div class="kpi-label">Total sorties</div><div class="kpi-value neg" id="kpiOut">—</div></div>
  <div class="kpi"><div class="kpi-label">Solde fin de mois</div><div class="kpi-value" id="kpiFinal">—</div></div>
</div>

<div class="chart-container">
  <div class="chart-title">Ligne de trésorerie cumulée</div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#4d9fff"></div> Solde cumulé</div>
    <div class="legend-item"><div class="legend-dot" style="background:#00e5a0"></div> Entrées du jour</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff4d6d"></div> Sorties du jour</div>
  </div>
  <canvas id="mainChart" height="110"></canvas>
</div>

<div class="table-container">
  <div class="table-header">Détail jour par jour</div>
  <div id="tableWrap"><div class="empty">Lance une actualisation pour charger les données Notion</div></div>
</div>

<script>
const MONTHS_FR = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
let currentYear = 2026, currentMonth = 4, chartInstance = null;

function updateMonthDisplay() {
  const label = `${MONTHS_FR[currentMonth-1]} ${currentYear}`;
  document.getElementById('monthLabel').textContent = label;
  document.getElementById('monthDisplay').textContent = label;
}
function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 12) { currentMonth = 1; currentYear++; }
  if (currentMonth < 1)  { currentMonth = 12; currentYear--; }
  updateMonthDisplay();
}
function setStatus(msg, type='') {
  const el = document.getElementById('status');
  el.textContent = msg; el.className = 'status ' + type;
}
function fmt(v) { return (v>=0?'+':'') + v.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' €'; }
function fmtAbs(v) { return Math.abs(v).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' €'; }

function getMontant(props) {
  // Essayer différents noms de propriété pour le montant
  const keys = ['Montant', 'Amount', 'montant'];
  for (const k of keys) {
    if (!props[k]) continue;
    if (props[k].number != null) return props[k].number;
    if (props[k].formula?.number != null) return props[k].formula.number;
  }
  return 0;
}

async function loadData() {
  const btn = document.getElementById('btnRefresh');
  btn.disabled = true;
  setStatus('Connexion à Notion…', 'loading');

  const nextMonth = currentMonth === 12 ? 1 : currentMonth + 1;
  const nextYear  = currentMonth === 12 ? currentYear + 1 : currentYear;
  const dateStart = `${currentYear}-${String(currentMonth).padStart(2,'0')}-01`;
  const dateEnd   = `${nextYear}-${String(nextMonth).padStart(2,'0')}-01`;

  try {
    const res = await fetch('/.netlify/functions/notion', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ dateStart, dateEnd })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.message) throw new Error(data.message);

    setStatus(`✓ ${data.revenus.length} revenus · ${data.depenses.length} dépenses chargés`, 'ok');
    processData(data.revenus, data.depenses);
  } catch(e) {
    setStatus('Erreur : ' + e.message, 'error');
    console.error(e);
  } finally {
    btn.disabled = false;
  }
}

function processData(revenus, depenses) {
  const soldeInitial = parseFloat(document.getElementById('soldeInitial').value) || 0;
  const daysInMonth  = new Date(currentYear, currentMonth, 0).getDate();
  const byDay = {};
  for (let d = 1; d <= daysInMonth; d++) byDay[d] = { e: 0, s: 0 };

  revenus.forEach(row => {
    const props = row.properties;
    const dateVal = props['Date']?.date?.start;
    if (!dateVal) return;
    const day = parseInt(dateVal.split('-')[2]);
    if (!byDay[day]) return;
    byDay[day].e += getMontant(props);
  });

  depenses.forEach(row => {
    const props = row.properties;
    const dateVal = props['Date']?.date?.start;
    if (!dateVal) return;
    const day = parseInt(dateVal.split('-')[2]);
    if (!byDay[day]) return;
    byDay[day].s += getMontant(props);
  });

  let solde = soldeInitial;
  const tableData = [];
  for (let d = 1; d <= daysInMonth; d++) {
    solde = Math.round((solde + byDay[d].e - byDay[d].s) * 100) / 100;
    tableData.push({ j: d, e: byDay[d].e, s: byDay[d].s, solde });
  }

  renderKPIs(soldeInitial, tableData);
  renderChart(tableData);
  renderTable(tableData);
}

function renderKPIs(soldeInitial, data) {
  const totalE = data.reduce((a,d) => a+d.e, 0);
  const totalS = data.reduce((a,d) => a+d.s, 0);
  const final  = data[data.length-1].solde;
  document.getElementById('kpiInit').textContent  = fmt(soldeInitial);
  document.getElementById('kpiInit').className    = 'kpi-value ' + (soldeInitial>=0?'pos':'neg');
  document.getElementById('kpiIn').textContent    = '+' + fmtAbs(totalE);
  document.getElementById('kpiOut').textContent   = '-' + fmtAbs(totalS);
  document.getElementById('kpiFinal').textContent = fmt(final);
  document.getElementById('kpiFinal').className   = 'kpi-value ' + (final>=0?'pos':'neg');
}

function renderChart(data) {
  const labels  = data.map(d => `${d.j}`);
  const soldes  = data.map(d => d.solde);
  const entrees = data.map(d => d.e);
  const sorties = data.map(d => -d.s);
  const ptColors = soldes.map(s => s>=0 ? '#4d9fff' : '#ff4d6d');
  if (chartInstance) chartInstance.destroy();
  const zonePlugin = {
    id: 'negZone',
    beforeDraw(chart) {
      const {ctx, scales:{x,y}} = chart;
      const yZ = y.getPixelForValue(0);
      ctx.save(); ctx.fillStyle = 'rgba(255,77,109,0.06)';
      ctx.fillRect(x.left, yZ, x.right-x.left, y.bottom-yZ); ctx.restore();
    }
  };
  const ctx = document.getElementById('mainChart').getContext('2d');
  chartInstance = new Chart(ctx, {
    type: 'bar', plugins: [zonePlugin],
    data: { labels, datasets: [
      { type:'line', label:'Solde cumulé', data:soldes, borderColor:'#4d9fff', backgroundColor:'rgba(77,159,255,0.07)', borderWidth:2.5, pointBackgroundColor:ptColors, pointBorderColor:ptColors, pointRadius:3.5, pointHoverRadius:6, tension:0.3, fill:true, order:0, yAxisID:'y' },
      { type:'bar', label:'Entrées', data:entrees, backgroundColor:'rgba(0,229,160,0.45)', borderColor:'rgba(0,229,160,0.75)', borderWidth:1, borderRadius:3, order:1, yAxisID:'y2' },
      { type:'bar', label:'Sorties', data:sorties, backgroundColor:'rgba(255,77,109,0.45)', borderColor:'rgba(255,77,109,0.75)', borderWidth:1, borderRadius:3, order:1, yAxisID:'y2' }
    ]},
    options: {
      responsive:true, interaction:{mode:'index',intersect:false},
      plugins: { legend:{display:false}, tooltip:{ backgroundColor:'#1e2330', titleColor:'#e8eaf0', bodyColor:'#a0a8b8', borderColor:'#2e3548', borderWidth:1, padding:12, titleFont:{family:'Syne',size:12,weight:'700'}, bodyFont:{family:'DM Mono',size:11},
        callbacks: { title:c=>`${c[0].label} ${MONTHS_FR[currentMonth-1]} ${currentYear}`, label:c=>{ const v=c.raw,a=Math.abs(v); if(c.dataset.label==='Solde cumulé') return ` Solde : ${v>=0?'+':''}${v.toFixed(2).replace('.',',')} €`; if(c.dataset.label==='Entrées') return ` Entrées : +${a.toFixed(2).replace('.',',')} €`; if(c.dataset.label==='Sorties') return ` Sorties : -${a.toFixed(2).replace('.',',')} €`; } }
      }},
      scales: {
        x:{ grid:{color:'rgba(255,255,255,0.04)'}, ticks:{color:'#5a6070',font:{family:'DM Mono',size:10}}, border:{color:'#1e2330'} },
        y:{ position:'left', grid:{color:'rgba(255,255,255,0.05)'}, ticks:{color:'#5a6070',font:{family:'DM Mono',size:10},callback:v=>(v>=0?'+':'')+v.toLocaleString('fr-FR')+' €'}, border:{color:'#1e2330'} },
        y2:{ position:'right', grid:{display:false}, ticks:{color:'#5a6070',font:{family:'DM Mono',size:10},callback:v=>Math.abs(v).toLocaleString('fr-FR')+' €'}, border:{color:'#1e2330'} }
      }
    }
  });
}

function renderTable(data) {
  const maxFlow = Math.max(...data.map(d=>Math.max(d.e,d.s)),1);
  let html = `<table><thead><tr><th>Jour</th><th>Entrées</th><th>Sorties</th><th>Net du jour</th><th>Solde cumulé</th><th>Flux</th></tr></thead><tbody>`;
  data.forEach(d => {
    const net=d.e-d.s, isZero=d.e===0&&d.s===0;
    const wIn=Math.round(d.e/maxFlow*70), wOut=Math.round(d.s/maxFlow*70);
    html += `<tr class="${isZero?'zero-row':''}">
      <td><b>${d.j} ${MONTHS_FR[currentMonth-1].substring(0,3).toLowerCase()}.</b></td>
      <td class="pos">${d.e>0?'+'+fmtAbs(d.e):'—'}</td>
      <td class="neg">${d.s>0?'-'+fmtAbs(d.s):'—'}</td>
      <td><span class="tag ${net>=0?'tag-pos':'tag-neg'}">${fmt(net)}</span></td>
      <td class="${d.solde>=0?'pos':'neg'}"><b>${fmt(d.solde)}</b></td>
      <td>${d.e>0?`<div class="mini-bar" style="width:${wIn}px;background:var(--accent-green)"></div>`:''}${d.s>0?`<div class="mini-bar" style="width:${wOut}px;background:var(--accent-red)"></div>`:''}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('tableWrap').innerHTML = html;
}

updateMonthDisplay();
loadData();
</script>
</body>
</html>
